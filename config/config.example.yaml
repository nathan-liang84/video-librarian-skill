# VideoLibrarian 配置示例
# 复制为 config/config.yaml 后填写真实值。config.yaml 已在 .gitignore,不会提交。

# ── 数据层 ───────────────────────────────────────────────
store:
  mode: sidecar            # feishu | sidecar | both
  sidecar:
    output_dir: ./output   # 旁车 JSON 与 _素材总表.xlsx 输出位置
    summary_file: _素材总表.xlsx
    media_root: ""         # 可选:素材根目录;rebuild-only 时用于扫描素材旁车
    thumb_dirname: .thumbs # 缩略图存放子目录(与素材同级)
  feishu:
    app_id: ""             # 飞书自建应用 App ID
    app_secret: ""         # App Secret(机密)
    app_token: ""          # 多维表格 app_token(Base)
    table_id: ""           # 素材库表 table_id
    # 所需权限见 docs/TASK_BREAKDOWN.md 飞书章节

# ── 模型(provider 无关:任何 OpenAI 兼容服务都可用)─────────
# 安装 skill 后建议由配置引导(见 SKILL.md)带你选择并填写。
# 已知 provider 有默认 base_url(minimax/qwen/doubao/openai/deepseek);
# 用其他服务(含本地 ollama/vLLM)只需 provider: local + 自填 base_url。
models:
  vision:                  # 看画面:【必须支持图像输入】
    provider: minimax      # minimax | qwen | doubao | openai | local ...
    model: MiniMax-M3      # 例:Qwen-VL → qwen-vl-plus;豆包 → doubao-vision-pro;OpenAI → gpt-4o
    api_key: ""
    base_url: ""           # 留空则用 provider 默认;local 必填
    max_frames_per_video: 36
  text:                    # 纯文本:总结/打标签/脚本匹配(选便宜的)
    provider: minimax
    model: MiniMax-M2.7    # 例:qwen-plus / deepseek-chat / gpt-4o-mini
    api_key: ""
    base_url: ""
  asr:
    provider: faster-whisper   # 本地优先;或 cloud
    model: small               # tiny|base|small|medium|large-v3
    device: auto               # auto|cpu|cuda
    language: zh

# 成本两档:quick=快扫建索引(便宜), refine=精修(标记后再跑)
cost_tier: quick           # quick | refine

# ── 抽帧策略 ─────────────────────────────────────────────
extract:
  scene_threshold: 0.4     # ffmpeg 场景切换检测阈值
  sample_interval_sec: 5   # 均匀采样兜底:每 N 秒 1 帧
  max_frames_per_minute: 6
  min_frames_short_clip: 3 # <10s 短视频至少抽几帧
  thumbnail_width: 320
  make_sprite: true        # 视频生成 3x3 概览雪碧图

# ── 人物名册(v1:主角固定,参考图引导识别)─────────────
# ⚠️ 本 skill 不预设任何主角。请由你填写自己的主角名,并上传对应参考图。
# 参考图按名字【自动发现】:把照片放 config/refs/,命名为 <人名>.jpg 或 <人名>_1.jpg
# (如 <主角名>.jpg / <主角名>_1.jpg / <同伴名>_1.png),这里只写人名即可,无需列路径。
# 【没露脸也想认出主角】参考图别只放正脸:加几张背影/全身/常穿搭/发型照
#   (<主角名>_背影.jpg / <主角名>_全身.jpg / <主角名>_穿搭1.jpg),模型会综合发型身形穿搭判断。
# config/refs/ 已 gitignore,照片只存本地、不上传。
people:
  main:
    name: ""              # 必填:你的主角名(对应 config/refs/<主角名>*.jpg)
  companions: []           # 固定关系人/宠物(可选,不填直接留 [])
  # 有需要时按下面格式添加,每人一条:
  #   - name: "<同伴名>"   # 对应 config/refs/<同伴名>*.jpg
  # 没露脸/没参考图时的文字补充:描述主角非面部特征,提示模型识别(可留空)
  main_recognition_hint: ""   # 例:"长直发、偏瘦、常穿浅色运动套装"
  # 主角先验:本库以主角为核心。开启后,画面有人但拿不准、又无法排除是主角时,
  # 倾向记为主角(低置信)并自动标 needs_review 待你一键确认,而不是漏成「多人」。
  bias_to_main: true
  # 名册外的人统一记为「多人」;无人记「空镜」
  # 如需手动指定路径也可:  - {name: 某某, refs: [config/refs/x.jpg]}

# ── 命名规则 ─────────────────────────────────────────────
naming:
  language: zh
  # 可用占位符:{date} {subject} {scene} {shot_type} {keyword} {seq}
  #   {subject} = 画面主体(每条都有):人物用名册名,否则物品/建筑/风景词(柠檬茶/教堂/海岸线)。
  #               由模型判断主次。{people} 是它的向后兼容别名(取同值)。
  template_photo: "{date}_{subject}_{scene}_{seq}"
  template_video: "{date}_{subject}_{scene}_{seq}"
  date_format: "%Y%m%d"
  seq_padding: 2
  drop_empty_segments: true   # 字段缺失时省略对应段,保持短
  max_length: 80

# ── 运行 ─────────────────────────────────────────────────
runtime:
  concurrency: 4
  needs_review_confidence: 0.6
  needs_review_quality: 3
  quick_max_frames: 4      # quick 档每个视频最多送多少帧给多模态(控成本);refine 档用 max_frames_per_video
