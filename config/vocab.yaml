# 受控标签词表 —— 这些字段的取值必须从下列枚举中选(可多选)。
# 模型在 03_understand 阶段被强制约束只能输出这些值;确实没有的才进 tags 自由字段。
# 用户可自行增删枚举值;改这里即可,无需改代码。

shot_type:            # 景别(单选)
  - 远景
  - 大全景
  - 全景
  - 中景
  - 近景
  - 特写
  - 大特写

camera_move:          # 运镜(多选,视频)
  - 固定镜头
  - 推
  - 拉
  - 摇
  - 移
  - 跟随
  - 升降
  - 航拍
  - 延时

mood:                 # 情绪/调性(多选)
  - 欢快
  - 平静
  - 温暖
  - 紧张
  - 悬疑
  - 壮阔
  - 忧伤
  - 治愈
  - 高能

lighting:             # 光线(单选)
  - 日光
  - 黄昏
  - 夜景
  - 室内
  - 逆光
  - 阴天
  - 人造光

scene:                # 场景(多选) —— 具体拍摄地点
  # 注意:此词表自抽象类别(城市/室内/街道…)改为具体地点。若你已有用旧词表
  # 标注过的 manifest/旁车,先跑一次迁移:python scripts/migrate_vocab.py [--apply]
  - 健身房
  - 花店
  - 餐厅
  - 咖啡厅
  - 家里
  - 户外街道
  - 商场
  - 酒店
  - 公园
  - 海边
  - 活动现场
  - 其他室内
  - 其他户外

suggested_use:        # 建议用途(多选)
  - 片头
  - 片尾
  - 转场
  - B-roll
  - 空镜
  - 采访同期
  - 氛围铺垫
  - 高潮段落
